name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    env:
      # Integration tests use SQLite in-memory; this satisfies database.py's import-time check.
      DATABASE_URL: sqlite:///./ci_test.db
      TELEGRAM_ENABLED: "false"
      ANTHROPIC_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest src/test/unit/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest src/test/integration/ -v --tb=short

  postgres-migration-check:
    name: Postgres 15 — Migration + Smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: trading
          POSTGRES_PASSWORD: trading
          POSTGRES_DB: trading_journal_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trading -d trading_journal_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://trading:trading@localhost:5432/trading_journal_ci
      TELEGRAM_ENABLED: "false"
      ANTHROPIC_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations (alembic upgrade head)
        # Use the installed alembic CLI binary, not `python -m alembic`.
        # The repo root contains an alembic/ directory (migrations); python -m alembic
        # finds that local package first and fails with "No module named alembic.__main__".
        # The same fix is applied in docker-entrypoint.sh (PYTHONPATH="" alembic upgrade head).
        run: alembic upgrade head

      - name: Run unit tests against Postgres URL
        run: python -m pytest src/test/unit/ -v --tb=short

      - name: Run Postgres smoke tests
        run: python -m pytest src/test/integration/test_postgres_smoke.py -v --tb=short

  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        env:
          CI: "true"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: cd frontend && npm run test:e2e
